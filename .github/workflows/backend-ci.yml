name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore backend/src/QuranSchool.API/QuranSchool.API.csproj
    - name: Build
      run: dotnet build backend/src/QuranSchool.API/QuranSchool.API.csproj --no-restore -c Release -v n
#    - name: Test
#      run: |
#        if [ -d "backend/tests/QuranSchool.Tests" ]; then
#          dotnet test backend/tests/QuranSchool.Tests/QuranSchool.Tests.csproj --no-build -c Release -v n
#        else
#          echo "No tests found, skipping."
#        fi
    - name: Verify Docker Build
      run: docker build -t quranschool-backend:test -f backend/Dockerfile backend/

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -f backend/Dockerfile backend/
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
    - name: Deploy to Amazon App Runner
      env:
        APP_RUNNER_SERVICE_NAME: ${{ secrets.APP_RUNNER_SERVICE_NAME }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        echo "Fetching Service ARN for: $APP_RUNNER_SERVICE_NAME"
        SERVICE_ARN=$(aws apprunner list-services --region $AWS_REGION --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE_NAME'].ServiceArn" --output text)
        
        if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" == "None" ]; then
          echo "Error: App Runner service '$APP_RUNNER_SERVICE_NAME' not found in region $AWS_REGION."
          exit 1
        fi
        
        echo "Service ARN: $SERVICE_ARN"
        
        # Wait for any in-progress operation to complete (max 10 minutes)
        for i in {1..20}; do
          STATUS=$(aws apprunner describe-service --service-arn $SERVICE_ARN --region $AWS_REGION --query "Service.Status" --output text)
          echo "Current service status: $STATUS"
          if [ "$STATUS" == "OPERATION_IN_PROGRESS" ]; then
            echo "Operation in progress, waiting 30 seconds... (Attempt $i/20)"
            sleep 30
          else
            break
          fi
        done

        echo "Updating service with image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        
        aws apprunner update-service \
          --region $AWS_REGION \
          --service-arn $SERVICE_ARN \
          --source-configuration "ImageRepository={ImageIdentifier=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG,ImageRepositoryType=ECR}"
